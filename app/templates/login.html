<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Favicon -->
    <link rel="shortcut icon" href="{{ url_for('static', filename='img/icons/favicon.ico') }}">
    <!-- Bulma Framework -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/font-awesome-4.7.0/css/font-awesome.min.css') }}">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/estilos.css') }}">
    <style>
        body {
          background-image: url('./static/img/bgHealth.png');
          background-size: cover;
        }
      </style>
    <title>PROSPERIDAD IPS S.A.S.</title>
</head>
<body>
    <div class="main-container">
        <div class="box login">
            <div class="columns">
                <div class="column is-half has-text-centered">
                    <div style="position: relative;">
                        <img src="{{ url_for('static', filename='img/logo-prosperidad-vct.webp') }}" style="display: inline-block;" alt="Logo_Prosperidad" width="300" height="300">
                    </div>
                </div>
                <div class="column">
                    <h5 class="title is-5 has-text-centered is-uppercase">Inicio de Sesión</h5>
                    <form action="/login" method="post" autocomplete="off">
                        <div class="field">
                            <div class="control has-icons-left">
                                <div class="select is-small">
                                <select name="user" id="user">
                                    {% for medico in medicos %}
                                    <option value="{{ medico.codigo }}">{{ medico.nombre }}</option>
                                    {% endfor %}
                                </select>
                                </div>
                                <div class="icon is-small is-left">
                                    <i class="fa fa-user"></i>
                                </div>
                            </div>
                        </div>  
                        <div class="field">
                            <p class="control has-icons-left">
                            <input class="input is-small" type="password" placeholder="Contraseña" id="password" name="password" readonly>
                            <span class="icon is-small is-left">
                                <i class="fa fa-lock"></i>
                            </span>
                            </p>
                        </div>
                        <div class="field">
                            <button class="button is-info is-fullwidth">
                                <span class="icon">
                                    <i class="fa fa-sign-in"></i>
                                </span>
                                <span>ACCEDER</span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>

{% with messages = get_flashed_messages() %}
{% if messages %}
{% for message in messages %}
<script>
    document.addEventListener('DOMContentLoaded', () =>{
        Swal.fire({
            title: "Advertencia!",
            text: "{{ message }}",
            icon: "warning"
        });
    });
</script>
{% endfor %}
{% endif %}
{% endwith %}

<script src="{{ url_for('static', filename='js/login.js')}}"></script>
</html>
